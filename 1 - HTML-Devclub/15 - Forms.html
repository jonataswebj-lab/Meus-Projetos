<form action="get" method="get">
    <h1>Digite seu endereço</h1>
    <br>

    <label for="rua"></label>
        Rua:
    <input
    type="text"
    id="rua"
    name="rua"
    autocomplete="street-address"/>

    <label for="number"></label>
        Número:
    <input
    type="number"
    id="number"
    name="number"
    />

    <label for="email"></label>
        Email:
    <input
    type="email"
    id="email"
    name="email"
    autocomplete="email"/>


    <button type="reset">Limpar</button>
    <button type="submit">Enviar dados</button>
</form>
